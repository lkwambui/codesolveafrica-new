version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: codesolveafrica-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: codesolveafrica
      MYSQL_USER: codesolve
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-codesolve123}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/prisma:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - codesolveafrica

  redis:
    image: redis:7-alpine
    container_name: codesolveafrica-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - codesolveafrica

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: codesolveafrica-backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: mysql://codesolve:codesolve123@mysql:3306/codesolveafrica
      REDIS_HOST: redis
      REDIS_PORT: 6379
      FRONTEND_URL: https://codesolveafrica.com
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - codesolveafrica

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: codesolveafrica-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: https://api.codesolveafrica.com
    depends_on:
      - backend
    networks:
      - codesolveafrica

volumes:
  mysql_data:
  redis_data:

networks:
  codesolveafrica:
    driver: bridge
