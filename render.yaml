# This blueprint assumes a PostgreSQL-compatible database (Render's managed Postgres).
# The project currently uses MySQL in schema.prisma. Before using this blueprint,
# either switch the Prisma provider to "postgresql" or use an external MySQL host.
#
# See https://render.com/docs/blueprint-spec for more info.

services:
  - type: web
    name: codesolveafrica-backend
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4000"
      - key: API_PREFIX
        value: api/v1
      - key: DATABASE_URL
        fromDatabase:
          name: codesolveafrica-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: codesolveafrica-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: FRONTEND_URL
        value: https://codesolveafrica-frontend.onrender.com
      - key: THROTTLE_TTL
        value: "60"
      - key: THROTTLE_LIMIT
        value: "100"

  - type: web
    name: codesolveafrica-frontend
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: https://codesolveafrica-backend.onrender.com/api/v1

databases:
  - name: codesolveafrica-db
    plan: free
    region: frankfurt
    databaseName: codesolveafrica
    user: codesolve

redis:
  - name: codesolveafrica-redis
    plan: free
    region: frankfurt
    maxmemoryPolicy: noeviction
